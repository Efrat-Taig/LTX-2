<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VLM Video QA — Scenes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #0e0e11; color: #e6e6e6;
      margin: 0; padding: 40px;
      min-height: 100vh;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .scene-card {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 20px 22px;
      cursor: pointer;
      text-decoration: none;
      color: #e6e6e6;
      transition: border-color 0.15s, background 0.15s;
    }
    .scene-card:hover {
      border-color: #4a80c0;
      background: #202028;
    }
    .scene-card h2 { font-size: 16px; margin: 0 0 6px; }
    .scene-card .meta { font-size: 13px; color: #888; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px;
             font-size: 11px; font-weight: 600; margin-right: 6px; }
    .badge.ready { background: #2d5731; color: #c8e6c9; }
    .badge.pending { background: #574026; color: #ffe0b2; }
  </style>
</head>
<body>
  <h1>🎬 VLM Video QA — Scene Comparisons</h1>
  <div class="subtitle">Each scene was generated by 6 different models. Click one to compare.</div>
  <div class="scene-grid" id="scene-grid"></div>

<script>
const SCENES = [
  { name: 'Crosswalk Safety',              folder: 'outputs_vlm_compare_skye_chase_crosswalk_safety' },
  { name: 'Crosswalk Safety (Chase talk)', folder: 'outputs_vlm_compare_skye_chase_crosswalk_safety_chase_talk' },
  { name: 'Garden Bench Sleep',            folder: 'outputs_vlm_compare_skye_chase_garden_bench_sleep' },
  { name: 'Trampoline Backflip',           folder: 'outputs_vlm_compare_skye_chase_trampoline_backflip' },
  { name: 'Helicopter Birthday (Gili)',    folder: 'outputs_vlm_compare_skye_helicopter_birthday_gili' },
];

async function checkScenes() {
  const grid = document.getElementById('scene-grid');
  for (const scene of SCENES) {
    try {
      const r = await fetch(`${scene.folder}/manifest.json`);
      if (r.ok) {
        const m = await r.json();
        grid.innerHTML += `
          <a class="scene-card" href="${scene.folder}/viewer.html">
            <h2>${scene.name} <span class="badge ready">${m.length} models</span></h2>
            <div class="meta">Click to compare →</div>
          </a>`;
      } else {
        grid.innerHTML += `
          <div class="scene-card" style="cursor:default; opacity:0.6;">
            <h2>${scene.name} <span class="badge pending">processing</span></h2>
            <div class="meta">Results not ready yet. Refresh.</div>
          </div>`;
      }
    } catch (e) {
      grid.innerHTML += `
        <div class="scene-card" style="cursor:default; opacity:0.6;">
          <h2>${scene.name} <span class="badge pending">not started</span></h2>
          <div class="meta">${e.message}</div>
        </div>`;
    }
  }
}
checkScenes();
</script>
</body>
</html>
